{% extends "base.html" %}
{% block title %}Edit Transaction - SkillVault{% endblock %}
{% block content %}
<div class="page page-centered">
  <div class="page-header"><div><div class="page-title">Edit Transaction</div><div class="page-subtitle">Update transaction details, links, and payment method.</div></div><a href="{{ url_for('income') }}" class="btn btn-ghost">Back</a></div>
  <div class="page-split">
    <div>
      <div class="form-card"><form method="post"><div class="form-group"><label>Transaction Type</label><div style="display: flex; gap: 10px;"><label style="text-transform: none; letter-spacing: 0; display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text); font-size: 14px; font-weight: 500; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; flex: 1; justify-content: center;"><input type="radio" name="type" value="income" {% if txn.type == 'income' %}checked{% endif %} style="width: auto; accent-color: var(--green);"><span style="color: var(--green);">Income</span></label><label style="text-transform: none; letter-spacing: 0; display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text); font-size: 14px; font-weight: 500; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; flex: 1; justify-content: center;"><input type="radio" name="type" value="expense" {% if txn.type == 'expense' %}checked{% endif %} style="width: auto; accent-color: var(--red);"><span style="color: var(--red);">Expense</span></label></div></div><div class="form-group"><label for="amount">Amount (PHP)</label><input type="number" id="amount" name="amount" value="{{ txn.amount }}" min="0.01" step="0.01" required></div><div class="form-group"><label for="description">Description *</label><input type="text" id="description" name="description" value="{{ txn.description }}" required></div><div class="form-group"><label for="payment_method">Payment Method</label><select id="payment_method" name="payment_method" required>{% for method in payment_methods %}<option value="{{ method }}" {% if txn.payment_method == method %}selected{% endif %}>{{ method }}</option>{% endfor %}</select></div><div class="form-group"><label for="job_id">Related Job (optional)</label><select id="job_id" name="job_id"><option value="">No job link</option>{% for job in jobs|reverse %}<option value="{{ job.id }}" {% if txn.job_id == job.id %}selected{% endif %}>{{ job.company }} · {{ job.role }} · {{ job.status }}</option>{% endfor %}</select></div><div class="form-group"><label for="skill_ids">Paid skill(s) (optional)</label><select id="skill_ids" name="skill_ids" multiple size="5" class="multi-select">{% for skill in skills %}<option value="{{ skill.id }}" {% if skill.id in txn.skill_ids %}selected{% endif %}>{{ skill.name }} · {{ skill.level }}</option>{% endfor %}</select><div class="form-hint">Select one or more skills this transaction belongs to.</div></div><div class="form-group"><label for="date">Date</label><input type="date" id="date" name="date" value="{{ txn.date }}"></div><button type="submit" class="btn btn-primary w-full">Save Changes</button></form></div>
    </div>
  </div>
</div>
{% endblock %}
