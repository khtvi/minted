{% extends "base.html" %}
{% block title %}Log Application - SkillVault{% endblock %}
{% block content %}
<div class="page">
  <div class="page-header"><div><div class="page-title">Log Application</div><div class="page-subtitle">Record a new job application transaction.</div></div><a href="{{ url_for('jobs') }}" class="btn btn-ghost"><- Back</a></div>
  <div class="form-card" style="max-width: 600px;"><form method="post"><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;"><div class="form-group mb-0"><label for="company">Company *</label><input type="text" id="company" name="company" placeholder="e.g. Canva AU" required autofocus></div><div class="form-group mb-0"><label for="role">Role *</label><input type="text" id="role" name="role" placeholder="e.g. Virtual Assistant" required></div></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;"><div class="form-group mb-0"><label for="platform">Platform</label><input type="text" id="platform" name="platform" placeholder="e.g. LinkedIn, Indeed, Remote OK"></div><div class="form-group mb-0"><label for="date_applied">Date Applied</label><input type="date" id="date_applied" name="date_applied" value="{{ today }}"></div></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;"><div class="form-group mb-0"><label for="cert_used">Cert / Skill Used</label><input type="text" id="cert_used" name="cert_used" placeholder="e.g. Google Analytics"></div><div class="form-group mb-0"><label for="time_invested">Time Invested (hours)</label><input type="number" id="time_invested" name="time_invested" placeholder="e.g. 1.5" min="0" step="0.1" value="0"></div></div><div class="form-group mt-16"><label for="notes">Notes</label><textarea id="notes" name="notes" placeholder="Any notes about this application..."></textarea></div><button type="submit" class="btn btn-primary w-full">Log Application</button></form></div>
</div>
{% endblock %}
