<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SkillVault{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="site-shell">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrap">
        {% for category, msg in messages %}
          <div class="flash {{ category }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>
</div>

  <script>
    (function () {
      const root = document.documentElement;
      root.classList.add("is-loading");
      window.addEventListener("load", () => {
        window.setTimeout(() => root.classList.remove("is-loading"), 250);
      });
      const storageKey = "theme";
      const stored = localStorage.getItem(storageKey);
      const prefersLight = window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: light)").matches;
      const initial = stored || (prefersLight ? "light" : "dark");
      if (initial === "dark") {
        root.setAttribute("data-theme", "dark");
      }
      const button = document.getElementById("theme-toggle");
      const setLabel = () => {
        const isDark = root.getAttribute("data-theme") === "dark";
        if (button) {
          const label = isDark ? "Switch to light mode" : "Switch to dark mode";
          button.setAttribute("aria-label", label);
          button.setAttribute("title", label);
          button.setAttribute("aria-pressed", isDark ? "true" : "false");
        }
      };
      const toggleTheme = () => {
        const isDark = root.getAttribute("data-theme") === "dark";
        if (isDark) {
          root.removeAttribute("data-theme");
          localStorage.setItem(storageKey, "light");
        } else {
          root.setAttribute("data-theme", "dark");
          localStorage.setItem(storageKey, "dark");
        }
        setLabel();
      };
      if (button) {
        setLabel();
        button.addEventListener("click", toggleTheme);
      }

      const initTour = () => {
        const tour = document.querySelector("[data-tour]");
        if (!tour) return;
        const steps = Array.from(tour.querySelectorAll("[data-tour-step]"));
        const spotlight = tour.querySelector("[data-tour-spotlight]");
        const popover = tour.querySelector("[data-tour-popover]");
        const title = tour.querySelector("[data-tour-title]");
        const body = tour.querySelector("[data-tour-body]");
        const next = tour.querySelector("[data-tour-next]");
        const skip = tour.querySelector("[data-tour-skip]");
        let index = 0;

        const endTour = () => {
          tour.remove();
          window.removeEventListener("resize", renderStep);
        };

        const placePopover = (rect) => {
          if (!popover) return;
          const margin = 12;
          const popoverRect = popover.getBoundingClientRect();
          const spaceBelow = window.innerHeight - rect.bottom;
          const showBelow = spaceBelow > popoverRect.height + 24;
          const top = showBelow ? rect.bottom + margin : rect.top - popoverRect.height - margin;
          const left = Math.min(
            Math.max(margin, rect.left),
            window.innerWidth - popoverRect.width - margin
          );
          popover.style.top = `${Math.max(margin, top)}px`;
          popover.style.left = `${left}px`;
        };

        const renderStep = () => {
          const step = steps[index];
          if (!step) {
            endTour();
            return;
          }
          const target = document.querySelector(step.dataset.target);
          if (!target) {
            endTour();
            return;
          }
          const rect = target.getBoundingClientRect();
          if (spotlight) {
            spotlight.style.top = `${rect.top - 6}px`;
            spotlight.style.left = `${rect.left - 6}px`;
            spotlight.style.width = `${rect.width + 12}px`;
            spotlight.style.height = `${rect.height + 12}px`;
          }
          if (title) title.textContent = step.dataset.title || "";
          if (body) body.textContent = step.dataset.body || "";
          if (next) next.textContent = index === steps.length - 1 ? "Finish" : "Next";
          requestAnimationFrame(() => placePopover(rect));
        };

        if (next) {
          next.addEventListener("click", () => {
            if (index < steps.length - 1) {
              index += 1;
              renderStep();
            } else {
              endTour();
            }
          });
        }
        if (skip) {
          skip.addEventListener("click", endTour);
        }
        tour.addEventListener("click", (event) => {
          const dismiss = event.target.closest("[data-tour-dismiss]");
          if (dismiss) endTour();
        });
        window.addEventListener("resize", renderStep);
        renderStep();
      };

      initTour();
    })();
  </script>

</body>
</html>
