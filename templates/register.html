{% extends "base.html" %}
{% block title %}Register - Minted{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-title">Create Account</div>
    <div class="auth-sub">Start tracking your career capital today.</div>
    <form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="pin">PIN / Password</label>
        <input
          type="password"
          id="pin"
          name="pin"
          placeholder="At least 8 characters"
          minlength="8"
          maxlength="128"
          required
        >
      </div>
      <div class="form-group">
        <label for="confirm_pin">Confirm PIN</label>
        <input
          type="password"
          id="confirm_pin"
          name="confirm_pin"
          placeholder="Repeat your password"
          minlength="8"
          maxlength="128"
          required
        >
      </div>
      <div class="form-hint">Password must be at least 8 characters.</div>
      <button type="submit" class="btn btn-primary w-full">Create Account</button>
    </form>
    <div class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Log In</a></div>
  </div>
</div>
{% endblock %}
