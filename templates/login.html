{% extends "base.html" %}
{% block title %}Login - Minted{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-title">Welcome back</div>
        <div class="auth-sub">Log in to your Minted.</div>
        <form method="post">
            <div class="form-group">
                <label for="login_id">Email or Username</label>
                <input type="text" id="login_id" name="login_id" placeholder="you@email.com or username" required autofocus>
            </div>
            <div class="form-group">
                <label for="pin">PIN / Password</label>
                <input type="password" id="pin" name="pin" placeholder="Your PIN" required>
            </div>
            <button type="submit" class="btn btn-primary w-full">Log In</button>
        </form>
        <div class="auth-link">
            No account yet? <a href="{{ url_for('register') }}">Register</a>
        </div>
    </div>
</div>
{% endblock %}
