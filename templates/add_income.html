{% extends "base.html" %}
{% block title %}Log Transaction - SkillVault{% endblock %}
{% block content %}
<div class="page">
  <div class="page-header"><div><div class="page-title">Log Transaction</div><div class="page-subtitle">Record income (deposit) or expense (withdrawal).</div></div><a href="{{ url_for('income') }}" class="btn btn-ghost"><- Back</a></div>
  <div class="form-card"><form method="post"><div class="form-group"><label>Transaction Type</label><div style="display: flex; gap: 10px;"><label style="text-transform: none; letter-spacing: 0; display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text); font-size: 14px; font-weight: 500; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; flex: 1; justify-content: center;"><input type="radio" name="type" value="income" checked style="width: auto; accent-color: var(--green);"><span style="color: var(--green);">+ Income</span></label><label style="text-transform: none; letter-spacing: 0; display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text); font-size: 14px; font-weight: 500; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; flex: 1; justify-content: center;"><input type="radio" name="type" value="expense" style="width: auto; accent-color: var(--red);"><span style="color: var(--red);">- Expense</span></label></div></div><div class="form-group"><label for="amount">Amount (PHP)</label><input type="number" id="amount" name="amount" placeholder="0.00" min="0.01" step="0.01" required></div><div class="form-group"><label for="description">Description *</label><input type="text" id="description" name="description" placeholder="e.g. React landing page project, Course subscription..." required></div><div class="form-group"><label for="date">Date</label><input type="date" id="date" name="date" value="{{ today }}"></div><button type="submit" class="btn btn-primary w-full">Log Transaction</button></form></div>
</div>
{% endblock %}
