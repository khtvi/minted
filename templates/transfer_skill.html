{% extends "base.html" %}
{% block title %}Transfer Hours - SkillVault{% endblock %}
{% block content %}
<div class="page">
  <div class="page-header"><div><div class="page-title">Transfer Hours</div><div class="page-subtitle">Move hours between related skills (e.g. JS -> TypeScript).</div></div><a href="{{ url_for('skills') }}" class="btn btn-ghost"><- Back</a></div>
  <div class="form-card"><form method="post"><div class="form-group"><label for="from_skill">From Skill</label><select id="from_skill" name="from_skill" required><option value="">Select source skill</option>{% for skill in user.skills %}<option value="{{ skill.id }}">{{ skill.name }} ({{ skill.balance }}h available)</option>{% endfor %}</select></div><div class="form-group"><label for="to_skill">To Skill</label><select id="to_skill" name="to_skill" required><option value="">Select destination skill</option>{% for skill in user.skills %}<option value="{{ skill.id }}">{{ skill.name }}</option>{% endfor %}</select></div><div class="form-group"><label for="hours">Hours to Transfer</label><input type="number" id="hours" name="hours" placeholder="e.g. 5" min="0.1" step="0.1" required></div><button type="submit" class="btn btn-violet w-full">Transfer Hours</button></form></div>
</div>
{% endblock %}
